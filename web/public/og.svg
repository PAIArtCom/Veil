<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Veil Open Graph image</title>
  <desc id="desc">Veil masks local secrets before AI provider egress.</desc>
  <defs>
    <style>
      .sans { font-family: "Plus Jakarta Sans", "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { font-family: ui-monospace, "SFMono-Regular", "JetBrains Mono", "Fira Code", monospace; }
    </style>
  </defs>

  <rect width="1200" height="630" fill="#1C1A17"/>
  <rect x="48" y="48" width="1104" height="534" rx="32" fill="#201F1C" stroke="#3A3835"/>

  <g transform="translate(92 92)">
    <g transform="translate(0 0)">
      <rect x="28" y="28" width="45" height="45" rx="11" fill="#F0EDE6"/>
      <rect x="18" y="18" width="45" height="45" rx="11" fill="#2BBF7E" opacity="0.45"/>
      <rect x="8" y="8" width="45" height="45" rx="11" fill="#2BBF7E"/>
    </g>
    <text class="sans" x="94" y="51" fill="#F0EDE6" font-size="36" font-weight="650" letter-spacing="-1">Veil</text>
  </g>

  <g transform="translate(92 180)">
    <rect x="0" y="0" width="306" height="34" rx="17" fill="#2C2A27" stroke="#3A3835"/>
    <circle cx="22" cy="17" r="4" fill="#2BBF7E"/>
    <text class="sans" x="38" y="22" fill="#F0EDE6" font-size="13" font-weight="700" letter-spacing="2">LOCAL PROXY FOR AI AGENTS</text>
  </g>

  <g transform="translate(92 270)">
    <text class="sans" x="0" y="0" fill="#F0EDE6" font-size="56" font-weight="650" letter-spacing="-2.2">Stop leaking secrets</text>
    <text class="sans" x="0" y="68" fill="#2BBF7E" font-size="56" font-weight="650" letter-spacing="-2.2">to AI providers.</text>
    <text class="sans" x="0" y="138" fill="#8A8680" font-size="22" font-weight="450">Mask credentials on 127.0.0.1 before cloud egress.</text>
    <text class="sans" x="0" y="173" fill="#8A8680" font-size="22" font-weight="450">Restore real values only on the trusted local path.</text>
  </g>

  <g transform="translate(720 104)">
    <rect x="0" y="0" width="382" height="422" rx="24" fill="#101310" stroke="#3A3835"/>
    <g transform="translate(32 34)">
      <text class="sans" x="0" y="0" fill="#8A8680" font-size="12" font-weight="700" letter-spacing="3">EGRESS BOUNDARY</text>
      <circle cx="314" cy="-4" r="4" fill="#2BBF7E"/>

      <text class="mono" x="0" y="70" fill="#8A8680" font-size="18">local request</text>
      <rect x="0" y="92" width="318" height="58" rx="12" fill="#1C1A17" stroke="#4A4844"/>
      <text class="mono" x="18" y="128" fill="#E05A3A" font-size="17">OPENAI_API_KEY=sk_live_...</text>

      <line x1="0" y1="214" x2="318" y2="214" stroke="#3A3835" stroke-width="2"/>
      <g transform="translate(140 190)">
        <rect x="16" y="16" width="32" height="32" rx="8" fill="#F0EDE6"/>
        <rect x="8" y="8" width="32" height="32" rx="8" fill="#2BBF7E" opacity="0.45"/>
        <rect x="0" y="0" width="32" height="32" rx="8" fill="#2BBF7E"/>
      </g>

      <text class="mono" x="0" y="288" fill="#8A8680" font-size="18">provider sees</text>
      <rect x="0" y="310" width="318" height="58" rx="12" fill="#17241D" stroke="#255B42"/>
      <text class="mono" x="18" y="346" fill="#2BBF7E" font-size="17">PAIArtVeil_SECRET_e5f6a7b8</text>
    </g>
  </g>
</svg>
