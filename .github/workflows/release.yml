name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run Go release checks
        shell: bash
        run: |
          set -euo pipefail
          go test -count=1 ./...
          go test -race -count=1 ./...
          go vet ./...
          go build ./...
          test -z "$(gofmt -l .)"
          git diff --check

      - name: Build release assets
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}" ./scripts/build-release.sh

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/gen-checksums.sh dist/release > dist/release/checksums.txt
          cat dist/release/checksums.txt

      - name: Prepare release notes
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          notes_file="${RUNNER_TEMP}/opencloak-release-notes.md"
          awk -v version="${version}" '
            /^## \[/ {
              if (found) {
                exit
              }
              if (index($0, "## [" version "]") == 1) {
                found = 1
              }
            }
            found {
              print
            }
          ' CHANGELOG.md > "${notes_file}"
          test -s "${notes_file}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          release_args=(
            "${GITHUB_REF_NAME}"
            dist/release/*
            --title "${GITHUB_REF_NAME}"
            --notes-file "${RUNNER_TEMP}/opencloak-release-notes.md"
          )

          if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
            release_args+=(--prerelease)
          fi

          gh release create "${release_args[@]}"
